<!DOCTYPE html>
<!-- FILE: voice-bridge/index.html | VERSION: 1.2.0 -->
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Captura de voz</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center; padding: 24px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    background: #c62828; color: #fff;
  }
  .pulse {
    width: 60px; height: 60px; border-radius: 50%; background: #fff;
    opacity: 0.9; margin-bottom: 20px; animation: pulse 1s infinite;
  }
  @keyframes pulse { 0%,100% { transform: scale(1); opacity: 0.9; } 50% { transform: scale(1.3); opacity: 0.5; } }
  p { font-size: 15px; max-width: 280px; }
</style>
</head>
<body>
  <div class="pulse"></div>
  <p id="status">Ouvindo... fale agora</p>
  <button id="stopBtn" style="padding:12px 24px;font-size:15px;font-weight:600;background:#fff;color:#c62828;border:none;border-radius:8px;cursor:pointer;">Parar</button>

  <script>
    // This page exists ONLY to escape the Google Apps Script iframe sandbox,
    // which blocks microphone permission for anything running inside it.
    // As a real top-level window (opened via window.open from the PWA),
    // it gets normal mic permission. Result goes back via postMessage.

    var resultSent = false;

    function sendResult(payload) {
      if (resultSent) return;
      resultSent = true;
      if (window.opener) window.opener.postMessage(payload, '*');
      setTimeout(function () { window.close(); }, payload.error ? 1500 : 300);
    }

    var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SpeechRecognition) {
      document.getElementById('status').textContent = 'Reconhecimento de voz não suportado neste navegador.';
      document.getElementById('stopBtn').style.display = 'none';
      sendResult({ source: 'voiceLeadBridge', error: 'unsupported' });
    } else {
      var recognition = new SpeechRecognition();
      recognition.lang = 'pt-BR';
      recognition.continuous = true;      // don't auto-stop on the first pause
      recognition.interimResults = false; // only accumulate finalized chunks
      recognition.maxAlternatives = 1;

      var currentTranscript = '';

      recognition.onresult = function (event) {
        var combined = '';
        for (var i = 0; i < event.results.length; i++) {
          combined += event.results[i][0].transcript + ' ';
        }
        currentTranscript = combined.trim();
        document.getElementById('status').textContent = 'Ouvindo: "' + currentTranscript + '"';
      };

      recognition.onerror = function (event) {
        // "no-speech" can fire mid-recording in continuous mode on some
        // devices even though the user is still talking — don't treat it
        // as fatal, just let onend decide based on what's accumulated.
        if (event.error !== 'no-speech') {
          document.getElementById('status').textContent = 'Erro: ' + event.error;
          sendResult({ source: 'voiceLeadBridge', error: event.error });
        }
      };

      // Fires only after stop() is explicitly called (manual button or
      // safety timeout below) — never on its own mid-sentence pause.
      recognition.onend = function () {
        if (resultSent) return;
        if (currentTranscript) {
          document.getElementById('status').textContent = 'Enviando: "' + currentTranscript + '"';
          sendResult({ source: 'voiceLeadBridge', transcript: currentTranscript });
        } else {
          document.getElementById('status').textContent = 'Nada foi reconhecido. Tente novamente.';
          sendResult({ source: 'voiceLeadBridge', error: 'no-speech' });
        }
      };

      recognition.start();

      document.getElementById('stopBtn').onclick = function () {
        document.getElementById('status').textContent = 'Processando...';
        recognition.stop();
      };

      // Safety timeout — never listen indefinitely, even if the button
      // is never pressed.
      setTimeout(function () {
        if (!resultSent) recognition.stop();
      }, 20000);
    }
  </script>
</body>
</html>
